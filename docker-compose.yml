services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: clausetrace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # Host port 5433: Docker Desktop's VM held a stale reservation on 5432.
      - '5433:5432'
    volumes:
      - clausetrace-pgdata:/var/lib/postgresql/data

volumes:
  clausetrace-pgdata:
